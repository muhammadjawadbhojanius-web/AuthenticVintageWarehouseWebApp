# --- Compression ----------------------------------------------------------
# Gzip is cheap on the CPU and saves 70-90% of the JS / JSON payload.
gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_proxied any;
gzip_comp_level 5;
gzip_types
    application/javascript
    application/json
    application/wasm
    application/xml
    application/xml+rss
    application/x-font-ttf
    application/x-font-opentype
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

server {
    listen 80;
    server_name _;

    # 5 MB chunk + headroom on the multipart envelope. Single-shot
    # uploads are never used by the new app.
    client_max_body_size 20M;

    # ----- API → FastAPI ---------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream chunks straight through; do not buffer them on disk first
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_http_version 1.1;

        # Allow long polls and slow chunks (per chunk, not per total upload)
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Pass Content-Range and Accept-Ranges through for video streaming
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }

    # ----- Long-cached static assets --------------------------------------
    # Next.js fingerprints these by content hash, so the URL changes
    # whenever the file changes. Safe to cache forever.
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Self-hosted fonts — same deal, the file path doesn't change.
    location /fonts/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ----- Everything else → Next.js standalone server --------------------
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
