services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_DIR=/app/data
    volumes:
      - uploads:/app/uploads
      - warehouse-db:/app/data
      # Bind-mount the user-editable templates directory so changes to
      # clipboard.json take effect immediately without rebuilding the image.
      - ./backend/app/templates:/app/app/templates:ro
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8082:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  uploads:
  warehouse-db:
